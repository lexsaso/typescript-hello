<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinema Seat Manager en TypeScript</title>
  </head>
  <body class="min-h-screen bg-gray-900 p-5 font-mono text-gray-100">
    <div class="mx-auto max-w-4xl">
      <header class="mb-8 text-center">
        <h1 class="decoration-double text-4xl font-bold text-yellow-500 underline">CINEMA MANAGER v1.0</h1>
        <p class="mt-2 text-gray-400">Sistema de Gestion de Reservas Independiente</p>
      </header>

      <div
        class="mb-12 flex h-8 w-full items-center justify-center rounded-t-3xl border-t border-gray-300 bg-gradient-to-b from-gray-500 to-transparent"
      >
        <span class="text-[10px] font-bold uppercase tracking-[1em] text-gray-900">PANTALLA</span>
      </div>

      <div class="grid grid-cols-1 gap-8 lg:grid-cols-3">
        <div class="lg:col-span-2">
          <div id="grid-container" class="grid grid-cols-10 gap-2 rounded-lg border border-gray-700 bg-gray-800 p-6"></div>

          <div class="mt-6 flex justify-center gap-6 text-sm">
            <div class="flex items-center gap-2">
              <div class="h-4 w-4 rounded-sm bg-emerald-500"></div>
              Disponible (L)
            </div>
            <div class="flex items-center gap-2">
              <div class="h-4 w-4 rounded-sm bg-red-600"></div>
              Ocupado (X)
            </div>
          </div>
        </div>

        <div class="space-y-6">
          <div class="rounded-lg border border-gray-700 bg-gray-800 p-5">
            <h2 class="mb-4 border-b border-gray-600 pb-2 text-lg font-bold">Disponibilidad</h2>
            <div id="stats" class="space-y-2 text-sm"></div>
          </div>

          <div class="rounded-lg border border-gray-700 bg-gray-800 p-5">
            <h2 class="mb-4 border-b border-gray-600 pb-2 text-lg font-bold">Asistente</h2>
            <button
              onclick="buscarPareja()"
              class="w-full rounded bg-yellow-600 py-3 font-bold text-white shadow-lg transition-all hover:bg-yellow-500 active:scale-95"
            >
              BUSCAR ASIENTOS JUNTOS
            </button>
            <div id="log-msg" class="mt-4 min-h-[60px] rounded border border-gray-600 bg-black p-3 text-xs text-yellow-400">
              Esperando accion...
            </div>
          </div>

          <button onclick="resetSala()" class="w-full text-xs text-gray-500 underline transition hover:text-red-400">
            Reiniciar toda la sala (Borrar todo)
          </button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
